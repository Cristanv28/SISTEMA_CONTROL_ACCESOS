<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Historial de Accesos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>

<body>
    <div class="container-fluid">
        <!-- HEADER -->
        <div class="header d-flex justify-content-between align-items-center">
            <div>
                <h3><i class="bi bi-clock-history" style="color: thistle;"></i> Historial de Accesos</h3>
                <p>Registro completo de entradas y salidas</p>
            </div>
            <div class="d-flex gap-2">
                <a href="index.html" class="btn btn-secondary">Volver al
                    Dashboard</a>
                <button class="btn btn-success" onclick="downloadExcel()"><i class="bi bi-file-earmark-arrow-down"></i>
                    Descargar Excel</button>
            </div>
        </div>
        <!-- FILTROS -->
        <div class="card text-white p-4 mb-4" style="background-color:#112266">
            <h5 class="mb-3">Filtros</h5>
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Fecha</label>
                    <input type="date" class="form-input-custom" id="filterDate" min="2026-01-01" max="2026-12-31">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Tipo de Evento</label>
                    <select class="form-select-custom" id="filterType">
                        <option value="">Entrada / Salida</option>
                        <option value="entrada">Entrada</option>
                        <option value="salida">Salida</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Carrera</label>
                    <input class="form-input-custom" id="filterCareer" placeholder="Ej: Sistemas">
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button class="btn btn-primary w-100" onclick="applyFilters()">Filtrar</button>
                </div>
            </div>
        </div>
        <!-- TABLA -->
        <div class="card text-white p-3" style="background-color:#112266">
            <h5 class="mb-3">Registro de Entradas y Salidas</h5>
            <table class="table table-secondary table-hover">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Matrícula</th>
                        <th>Carrera</th>
                        <th>Tipo</th>
                        <th>Fecha</th>
                        <th>Hora</th>
                    </tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

   <script src="js/supabase-config.js"></script>

    <script src="js/historial.js"> </script>

</body>

</html>
