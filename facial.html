<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registro Biométrico - Face ID</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container-fluid px-4 py-3">
        
        <div class="header d-flex justify-content-between align-items-center">
            <div>
                <h3>📷 Registro de Face ID</h3>
                <p>Configuración de parámetros y reconocimiento biométrico facial</p>
            </div>
            <div class="d-flex gap-2 align-items-center">
                <a href="tarjeta.html" class="btn btn-outline-light btn-sm">
                    💳 Volver a Tarjetas
                </a>
                <a href="index.html" class="btn btn-outline-secondary btn-sm">
                    ← Dashboard
                </a>
            </div>
        </div>

        <div class="facial-card text-center shadow">
            <h5 class="text-start mb-3">👤 Vinculación de Rostro</h5>
            
            <div class="text-start mb-4">
                <label class="form-label">Seleccionar Usuario para Face ID</label>
                <select class="form-select form-select-dark" id="selectUsuarioFacial">
                    <option value="">— Selecciona un usuario para el escaneo —</option>
                </select>
            </div>

            <div class="video-container mb-4">
                <video id="camaraFacial" autoplay playsinline></video>
            </div>

            <div class="d-flex gap-3 justify-content-center">
                <button class="btn btn-success px-4 py-2 fw-bold" onclick="iniciarCamara()">
                    ▶ Iniciar Cámara
                </button>
                <button class="btn btn-danger px-4 py-2 fw-bold" onclick="detenerCamara()">
                    ⏹ Detener Cámara
                </button>
            </div>

            <div id="estadoFacial" class="mt-4 fw-bold p-2 bg-dark bg-opacity-25 rounded">
                Esperando activación...
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="js/supabase-config.js"></script>
    
    <script src="js/facial.js"></script>

</body>

</html>
